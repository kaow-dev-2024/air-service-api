services:
  app:
    build: .
    container_name: api-dev
    env_file:
      - .env.dev
    environment:
      NODE_ENV: development
      PORT: ${PORT:-5001}
      DB_HOST: db
    command: npm run dev
    ports:
      - "${PORT:-5001}:${PORT:-5001}"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pai-network-dev

  db:
    image: postgres:16
    container_name: db-dev
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - pai-network-dev

networks:
  pai-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
